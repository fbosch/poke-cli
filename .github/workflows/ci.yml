name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fallow:
    name: Fallow audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Fallow audit
        uses: fallow-rs/fallow@v2
        with:
          command: audit

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Configure devenv cache
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Validate devenv
        run: devenv test

      - name: Install dependencies
        shell: devenv shell bash -- -e {0}
        run: bun install --frozen-lockfile

      - name: Run CI checks
        shell: devenv shell bash -- -e {0}
        run: bun run ci
